# Lefthook — pre-commit gates. Mirrors Fathom's discipline.
# Install: pnpm prepare  (runs `lefthook install`)

pre-commit:
  parallel: true
  jobs:
    - name: biome
      run: pnpm biome check --write {staged_files}
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css,gql,graphql}"
      stage_fixed: true

    - name: typecheck-core
      run: pnpm --filter @zonot/core typecheck
      glob: "packages/core/**/*.ts"

    - name: typecheck-worker
      run: pnpm --filter @zonot/worker typecheck
      glob: "apps/worker/**/*.ts"

    - name: typecheck-cli
      run: pnpm --filter zonot typecheck
      glob: "apps/cli/**/*.ts"

    - name: typecheck-mobile
      run: pnpm --filter @zonot/mobile typecheck
      glob: "apps/mobile/**/*.{ts,tsx}"

pre-push:
  jobs:
    - name: full-ci
      run: pnpm ci
