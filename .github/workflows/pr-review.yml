name: PR review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

# One in-flight review per PR; a new push supersedes the previous run.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Job id `review` == the required-status-check context. The job ALWAYS runs to
  # completion so the `review` check always reports green/red (never perpetually
  # pending). Fork/draft PRs skip the agent *inside* the job and still report
  # green — gating via a job-level `if` would leave a required check stuck pending.
  review:
    # GitHub-hosted, deliberately NOT self-hosted: the review agent executes
    # PR-influenced code, so the job must run on an ephemeral VM where the blast
    # radius is one comment-scoped token plus a spend-capped API key — never on
    # a machine holding real credentials.
    runs-on: ubuntu-latest
    # Budget/turn caps only bind on completed turns — a hung SDK stream would
    # otherwise burn a runner for GitHub's 6h default.
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Gate — same-repo, non-draft only
        id: gate
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ] \
             && [ "${{ github.event.pull_request.draft }}" = "false" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping review (fork PR or draft) — reporting green. Secrets are unavailable to forks and forks can't be autopilot PRs."
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.gate.outputs.run == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # The gate toolchain (review CLI + its deps) comes from claude-autopilot@main,
      # NOT from this repo's PR tree and NOT from npm (the package is consumed via
      # a local link: dependency that doesn't resolve in CI). A nested checkout
      # also means a PR here cannot rewrite the judge's code — only the skill body
      # (.claude/skills/pr-review/SKILL.md) comes from this repo.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.gate.outputs.run == 'true'
        with:
          repository: cdhorne/claude-autopilot
          ref: main
          path: .autopilot-gate

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        if: steps.gate.outputs.run == 'true'
        with:
          package_json_file: .autopilot-gate/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: .autopilot-gate/pnpm-lock.yaml

      - name: Install gate toolchain
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts --dir .autopilot-gate

      # The CLI produces the review, posts one PR comment, and exits non-zero on a
      # confirmed blocking finding (or on any refusal / SDK error — fail closed).
      # That exit code is the job result, hence the `review` check color.
      # cwd stays the repo root, so the CLI reviews THIS repo (REPO = cwd's git
      # toplevel) while running the gate's own code from .autopilot-gate/.
      - name: Run review gate
        if: steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Deliberately the built-in token, NOT a PAT: the review agent inherits
          # this env, and the scoped token (comment, no push/merge) bounds
          # prompt-injection blast radius; comments post as github-actions[bot].
          GH_TOKEN: ${{ github.token }}
          CI: "true"
        run: node .autopilot-gate/packages/autopilot/bin/claude-autopilot.js pr-review --pr "${{ github.event.pull_request.number }}"
